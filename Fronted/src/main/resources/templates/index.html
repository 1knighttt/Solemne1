<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mantenedor Personas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
    <h1 class="mb-4">Mantenedor Personas</h1>
    
    <a th:href="@{/crud/persona/nuevo}" class="btn btn-primary mb-3">
        + Agregar Persona
    </a>

    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
            <tr>
                <th>NOMBRE</th>
                <th style="width: 200px;">FUNCIONES</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${personas}">
                <td th:text="${p.nombre}"></td>
                <td>
                    <a th:href="@{/crud/persona/editar/{id}(id=${p.id})}" 
                       class="btn btn-warning btn-sm text-white">
                       Editar
                    </a>
                    
                    <a th:href="@{/crud/persona/{id}(id=${p.id})}" 
                       class="btn btn-danger btn-sm">
                       Borrar
                    </a>
                </td>
            </tr>
        </tbody>
        <tfoot class="thead-light">
            <tr>
                <th>NOMBRE</th>
                <th>FUNCIONES</th>
            </tr>
        </tfoot>
    </table>
</div>

</body>
</html>
