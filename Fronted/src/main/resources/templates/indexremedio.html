<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mantenedor Remedio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Mantenedor Remedio</h2>
        <a th:href="@{/crud/remedio/nuevo}" class="btn btn-primary">Nuevo Remedio</a>
    </div>

    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>NOMBRE CIENTIFICO</th>
                <th>MARCA</th>
                <th>GRAMOS</th>
                <th>ANIO</th>
                <th>TIPO</th>
                <th>CONTROLADO</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${remedios}">
                <td th:text="${r.nombreCientifico}"></td>
                <td th:text="${r.marca}"></td>
                <td th:text="${r.gramos}"></td>
                <td th:text="${r.anio}"></td>
                <td th:text="${r.tipo}"></td>
                <td th:text="${r.controlado}"></td>
                <td>
                    <a th:href="@{/crud/remedio/editar/{id}(id=${r.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/crud/remedio/eliminar/{id}(id=${r.id})}" class="btn btn-danger btn-sm">Borrar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
